<!-- Fix for passive event listener warnings -->
<script>
(function() {
    'use strict';
    // Quick fix for passive event listener warnings
    var originalAdd = EventTarget.prototype.addEventListener;
    EventTarget.prototype.addEventListener = function(type, listener, options) {
        if ((type === 'mousewheel' || type === 'wheel' || type === 'touchstart' || type === 'touchmove') && 
            (typeof options !== 'object' || options.passive === undefined)) {
            var opts = typeof options === 'object' ? Object.assign({}, options) : {};
            if (typeof options === 'boolean') opts.capture = options;
            opts.passive = true;
            return originalAdd.call(this, type, listener, opts);
        }
        return originalAdd.call(this, type, listener, options);
    };
    // Pre-add passive touch listeners
    ['touchstart', 'touchmove'].forEach(function(e) {
        document.addEventListener(e, function(){}, {passive: true});
    });
})();
</script>
<script src="fix-passive-events.js"></script>
